<header>
    <h1>تیم گرافیک</h1>
    <nav>
        <div class="base">
            <div class="user">
                {% if user.is_authenticated %}
                    <ul>
                        <li><a href="javascript:void(0)">{{ user.first_name }} عزیز خوش آمدید</a></li>
                        <li><a href="/logout">خروج</a></li>
                    </ul>
                {% else %}
                    <form method="post" action="{% url 'user:user_login' %}">
                        {% csrf_token %}
                        {# A more "HTML" way of creating the login form #}
                        <input type="text" name="username" placeholder="Username">
                        <input type="password" name="password" placeholder="Password">
                        <button type="submit" name="" value="Login">ok</button>
                    </form>
<!--                    <ul class="fast_login_mob">-->
<!--                        <li><a href="/login">ورود</a></li>-->
<!--                        <li><a href="/signup">ثبت نام</a></li>-->
<!--                    </ul>-->
                {% endif %}
            </div>
            <ul>
                <li><a id="productlink"href="javascript:void(0)">محصولات</a></li>
                <li><a href="javascript:void(0)">تعرفه قیمت</a></li>
                <li><a href="javascript:void(0)">طراحی</a></li>
                <li><a href="javascript:void(0)">بلاگ</a></li>
                <li><a href="javascript:void(0)">درباره ما</a></li>
            </ul>
        </div>
    </nav>
</header>
